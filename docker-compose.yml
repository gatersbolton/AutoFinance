version: "3.9"

services:
  web:
    build: .
    env_file:
      - .env
    command: uvicorn webapp.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${WEBAPP_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ./data:/app/data

  worker:
    build: .
    env_file:
      - .env
    command: >
      sh -c "if [ \"$WEBAPP_QUEUE_BACKEND\" = \"rq\" ];
      then python -m webapp.operations run-rq-worker;
      else python -m webapp.runner run-worker; fi"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "webapp.runner", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ./data:/app/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["rq"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autofinance
      POSTGRES_USER: autofinance
      POSTGRES_PASSWORD: autofinance
    restart: unless-stopped
    profiles: ["postgres"]
