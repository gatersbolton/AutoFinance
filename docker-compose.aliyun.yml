version: "3.9"

services:
  web:
    environment:
      WEBAPP_ENV: ${WEBAPP_ENV:-prod}
      WEBAPP_AUTH_REQUIRED: ${WEBAPP_AUTH_REQUIRED:-1}
      WEBAPP_ENABLE_LOCAL_WORKER: ${WEBAPP_ENABLE_LOCAL_WORKER:-0}
      WEBAPP_AUTO_RUN_UPLOAD_OCR: ${WEBAPP_AUTO_RUN_UPLOAD_OCR:-1}
      WEBAPP_UPLOAD_OCR_METHOD: ${WEBAPP_UPLOAD_OCR_METHOD:-cloud_first}

  worker:
    environment:
      WEBAPP_ENV: ${WEBAPP_ENV:-prod}
      WEBAPP_AUTH_REQUIRED: ${WEBAPP_AUTH_REQUIRED:-1}
      WEBAPP_ENABLE_LOCAL_WORKER: ${WEBAPP_ENABLE_LOCAL_WORKER:-0}
      WEBAPP_AUTO_RUN_UPLOAD_OCR: ${WEBAPP_AUTO_RUN_UPLOAD_OCR:-1}
      WEBAPP_UPLOAD_OCR_METHOD: ${WEBAPP_UPLOAD_OCR_METHOD:-cloud_first}

  nginx:
    ports:
      - "${NGINX_PORT:-80}:80"
