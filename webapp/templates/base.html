<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ settings.app_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script defer src="{{ url_for('static', path='app.js') }}"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="shell shell--header">
            <div>
                <a class="brand" href="/">AutoFinance Web MVP</a>
                <p class="subtitle">Cloud-first OCR orchestration for audit users. Paddle remains pilot-only.</p>
            </div>
            <nav class="nav-links">
                <a href="/jobs/new">新建任务</a>
                <a href="/jobs">任务列表</a>
                <a href="/system">系统状态</a>
            </nav>
        </div>
    </header>
    <main class="shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
